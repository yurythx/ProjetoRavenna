worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ────────────────────────────────────────────────────────────────
    log_format json_combined escape=json
        '{'
        '"time":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"method":"$request_method",'
        '"uri":"$request_uri",'
        '"status":$status,'
        '"body_bytes":$body_bytes_sent,'
        '"request_time":$request_time,'
        '"upstream_time":"$upstream_response_time",'
        '"http_referrer":"$http_referer",'
        '"http_user_agent":"$http_user_agent"'
        '}';
    access_log /var/log/nginx/access.log json_combined;

    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    gzip               on;
    gzip_types         text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length    1024;
    client_max_body_size 20M;

    # ── Rate limiting zones ───────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;

    # ── Upstream: Django/Daphne (HTTP + WebSocket) ────────────────────────────
    upstream backend {
        server backend:8000;
        keepalive 32;
    }

    # ── Upstream: Next.js frontend ────────────────────────────────────────────
    upstream frontend {
        server frontend:3000;
        keepalive 16;
    }

    # ── Unified server on port 80 (Cloudflare handles SSL) ───────────────────
    server {
        listen 80;
        server_name _;

        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;

        # ── Django admin ─────────────────────────────────────────────────────
        location /admin/ {
            proxy_pass         http://backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ── Django API (rate-limited) ─────────────────────────────────────────
        location /api/ {
            limit_req zone=api burst=60 nodelay;
            proxy_pass         http://backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        # ── Auth endpoints (stricter rate limit) ─────────────────────────────
        location ~ ^/api/v1/accounts/(login|register|password-reset) {
            limit_req zone=auth burst=10 nodelay;
            proxy_pass         http://backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ── WebSocket (Django Channels) ───────────────────────────────────────
        location /ws/ {
            proxy_pass          http://backend;
            proxy_http_version  1.1;
            proxy_set_header    Upgrade    $http_upgrade;
            proxy_set_header    Connection "upgrade";
            proxy_set_header    Host       $host;
            proxy_set_header    X-Real-IP  $remote_addr;
            proxy_read_timeout  86400s;
            proxy_send_timeout  86400s;
        }

        # ── Django static & media ─────────────────────────────────────────────
        location /static/ {
            proxy_pass http://backend;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        location /media/ {
            proxy_pass http://backend;
            expires 7d;
            add_header Cache-Control "public";
        }

        # ── Next.js frontend (everything else) ───────────────────────────────
        location / {
            proxy_pass         http://frontend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Next.js HMR WebSocket
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
        }

        # ── API schema docs ───────────────────────────────────────────────────
        location /api/schema/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
        }
    }

    # ── Dev server (HTTP only, no SSL requirement) ────────────────────────────
    # Comment out the HTTPS block above and use this for local dev:
    #
    # server {
    #     listen 80;
    #     server_name localhost;
    #
    #     location /api/  { proxy_pass http://backend; proxy_set_header Host $host; }
    #     location /admin/{ proxy_pass http://backend; proxy_set_header Host $host; }
    #     location /ws/   {
    #         proxy_pass http://backend; proxy_http_version 1.1;
    #         proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection "upgrade";
    #     }
    #     location /      { proxy_pass http://frontend; proxy_set_header Host $host; }
    # }
}
